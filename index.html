<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Match Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #0F3097;       /* Azul Royal Vivo do uniforme de 2002 */
            --bg-darker: #0A226B;     /* Sombra para profundidade */
            --card-white: #FFFFFF;
            --accent-neon: #D4FF00;   /* Amarelo/Verde limão elétrico de 2002 */
            --text-dark: #051238;
            --text-muted: #627293;
            --kit-white: #EBF0FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            background-image: linear-gradient(135deg, var(--bg-blue) 0%, var(--bg-darker) 100%);
            color: var(--card-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            background: var(--kit-white);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            opacity: 0.15;
            pointer-events: none;
        }

        header {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 24px 20px 10px;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 6px 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 0px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background: var(--accent-neon);
            color: var(--bg-blue);
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px 140px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .page-title {
            text-align: center;
            font-size: 1.4rem;
            text-transform: lowercase;
            margin-bottom: 30px;
            color: var(--card-white);
            font-weight: 400;
            letter-spacing: -0.5px;
        }

        /* Grid Única de Filtros Sem Divisões de Categorias */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .filter-box {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: var(--card-white);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.15s ease;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px; /* Cantos vivos e secos */
        }

        .filter-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .filter-box.active {
            background: var(--card-white);
            color: var(--text-dark);
            border-color: var(--accent-neon);
            box-shadow: 0 0 12px rgba(212, 255, 0, 0.2);
            font-weight: 900;
        }

        .filter-box.disabled {
            opacity: 0.2;
            cursor: default;
            border-style: dashed;
        }

        /* Lista de Partidas */
        .match-list-container {
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-neon);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: lowercase;
        }

        .match-card {
            background: var(--card-white);
            color: var(--text-dark);
            margin-bottom: 14px;
            border-radius: 0px;
            border-left: 6px solid var(--bg-blue);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 18px rgba(5, 18, 56, 0.2);
            position: relative;
        }

        .match-card::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--kit-white);
            opacity: 0.4;
        }

        .match-card-content {
            flex-grow: 1;
            padding-right: 15px;
        }

        .match-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: lowercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .match-teams {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: -0.3px;
        }

        .match-teams-sm {
            text-transform: lowercase;
            font-weight: 700;
        }

        .match-group-badge {
            background: var(--bg-blue);
            color: var(--accent-neon);
            padding: 1px 6px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 0px;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }

        .select-check {
            height: 24px;
            width: 24px;
            cursor: pointer;
            accent-color: var(--bg-blue);
        }

        /* Barra de Ações Inferiores */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-darker);
            padding: 24px 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--card-white);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: lowercase;
            cursor: pointer;
            width: 100%;
            max-width: 560px;
            border-radius: 0px;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            border-color: var(--card-white);
        }

        .action-btn.primary {
            background: var(--accent-neon);
            color: var(--text-dark);
            border-color: var(--accent-neon);
            font-weight: 900;
        }

        .action-btn.primary:hover {
            box-shadow: 0 0 15px rgba(212, 255, 0, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">PT 🇧🇷</button>
    </header>

    <main id="screen-filter">
        <h1 class="page-title" id="filter-title">o que você quer assistir?</h1>
        <div class="filter-grid" id="container-unificado">
            <div class="loading">buscando opções de jogos...</div>
        </div>
    </main>

    <main id="screen-matches" style="display:none;">
        <h1 class="page-title" id="matches-title">selecione</h1>
        <div class="match-list-container" id="matches-container"></div>
    </main>

    <div class="action-bar" id="action-bar-filter">
        <button class="action-btn" onclick="showMatchesScreen()" id="btn-partidas">partidas</button>
    </div>

    <div class="action-bar" id="action-bar-whatsapp" style="display:none;">
        <button class="action-btn primary" id="share-btn" onclick="shareToWhatsApp()">enviar por whatsapp (0)</button>
    </div>

    <script>
        // URL ATUALIZADA DA SUA API DO GOOGLE
        const API_URL = "https://script.google.com/macros/s/AKfycbzycmTZFSYxA-g5HL1kJ-6QZoU_HQcU2ncMKsZWMwamuzUMhkGWE6Ie6lNL8G0Q2bqC/exec";
        const GITHUB_PAGES_URL = "https://annefrancischini-vc.github.io/my-world-cup-matches/";

        let currentLang = 'PT';
        let matchesData = [];
        const selectedFilters = new Set();
        const selectedMatches = new Set();

        const dictionary = {
            EN: {
                filterTitle: "what do you want to watch?",
                matchesTitle: "select",
                actionPartidas: "matches",
                greeting: "Hello! Let's watch these matches?",
                footerMsg: "Plan yours here: ",
                shareBtnBase: "send via whatsapp"
            },
            PT: {
                filterTitle: "o que você quer assistir?",
                matchesTitle: "selecione",
                actionPartidas: "partidas",
                greeting: "Olá! Vamos assistir a esses jogos?",
                footerMsg: "Monte a sua programação aqui: ",
                shareBtnBase: "enviar por whatsapp"
            }
        };

        const locales = { EN: 'en-US', PT: 'pt-BR' };
        const weekdaysMap = {
            EN: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
            PT: ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado']
        };

        async function fetchMatches() {
            try {
                const response = await fetch(API_URL);
                matchesData = await response.json();
                
                if (!Array.isArray(matchesData)) {
                    throw new Error("Formato inválido recebido.");
                }

                matchesData.sort((a, b) => new Date(a.DateTime_UTC) - new Date(b.DateTime_UTC));
                buildFilterButtons();
            } catch (error) {
                console.error("Erro na API: ", error);
                document.getElementById('container-unificado').innerHTML = "<div class='loading'>erro ao carregar dados. verifique a publicação do seu app script.</div>";
            }
        }

        // Agrupa países e jogadores de forma invisível em uma lista alfabética corrida
        function buildFilterButtons() {
            const filterSet = new Set();

            matchesData.forEach(match => {
                const t1 = currentLang === 'EN' ? (match.Team1_EN || "") : (match.Team1_PT || "");
                const t2 = currentLang === 'EN' ? (match.Team2_EN || "") : (match.Team2_PT || "");
                const fEspecial = match.filter_especial || "";

                if (t1.trim() !== "") filterSet.add(t1.toUpperCase().trim());
                if (t2.trim() !== "") filterSet.add(t2.toUpperCase().trim());
                if (fEspecial.trim() !== "") filterSet.add(fEspecial.toUpperCase().trim());
            });

            const container = document.getElementById('container-unificado');
            container.innerHTML = '';
            
            const sortedFilters = Array.from(filterSet).sort();
            
            sortedFilters.forEach(filterName => {
                const btn = document.createElement('div');
                btn.className = `filter-box ${selectedFilters.has(filterName) ? 'active' : ''}`;
                btn.innerText = filterName;
                btn.onclick = () => toggleFilter(filterName, btn);
                container.appendChild(btn);
            });

            // Completa os blocos vazios com "..." para manter o padrão visual de 3 colunas
            const remainder = sortedFilters.length % 3;
            if (remainder !== 0) {
                const needed = 3 - remainder;
                for (let i = 0; i < needed; i++) {
                    const blank = document.createElement('div');
                    blank.className = 'filter-box disabled';
                    blank.innerText = '...';
                    container.appendChild(blank);
                }
            }
        }

        function toggleFilter(value, element) {
            if (selectedFilters.has(value)) {
                selectedFilters.delete(value);
                element.classList.remove('active');
            } else {
                selectedFilters.add(value);
                element.classList.add('active');
            }
        }

        function showMatchesScreen() {
            document.getElementById('screen-filter').style.display = 'none';
            document.getElementById('action-bar-filter').style.display = 'none';
            
            document.getElementById('screen-matches').style.display = 'flex';
            document.getElementById('action-bar-whatsapp').style.display = 'flex';

            renderFilteredMatches();
        }

        // Varre múltiplos filtros contra os times e a coluna filter_especial (Ex: Haaland = Noruega)
        function renderFilteredMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            let hasMatches = false;

            matchesData.forEach(match => {
                let showMatch = false;

                if (selectedFilters.size === 0) {
                    showMatch = true; // Se nenhum card for selecionado, exibe toda a tabela
                } else {
                    const t1PT = (match.Team1_PT || "").toUpperCase().trim();
                    const t2PT = (match.Team2_PT || "").toUpperCase().trim();
                    const t1EN = (match.Team1_EN || "").toUpperCase().trim();
                    const t2EN = (match.Team2_EN || "").toUpperCase().trim();
                    const fEspecial = (match.filter_especial || "").toUpperCase().trim();

                    for (let filter of selectedFilters) {
                        if (t1PT === filter || t2PT === filter || 
                            t1EN === filter || t2EN === filter || 
                            fEspecial === filter) {
                            showMatch = true;
                            break; 
                        }
                    }
                }

                if (showMatch) {
                    hasMatches = true;
                    
                    const matchDate = new Date(match.DateTime_UTC);
                    const weekdayIndex = matchDate.getDay();
                    const weekdayShort = weekdaysMap[currentLang][weekdayIndex].substring(0, 3);
                    
                    const dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                    const timeStr = matchDate.toLocaleTimeString(locales[currentLang], { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;

                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="match-card-content">
                            <div class="match-meta">${weekdayShort} - ${dateStr} - ${match.Stadium || ""}</div>
                            <div class="match-teams">${team1} VS <span class="match-teams-sm">${team2}</span><span class="match-group-badge">GRP ${match.Group || ""}</span></div>
                        </div>
                        <input type="checkbox" class="select-check" data-id="${match.ID}" ${selectedMatches.has(match.ID.toString()) ? 'checked' : ''} onchange="handleSelect(this)">
                    `;
                    container.appendChild(card);
                }
            });

            if (!hasMatches) {
                container.innerHTML = `<div class="loading">nenhuma partida encontrada.</div>`;
            }

            updateShareButtonText();
        }

        function handleSelect(checkbox) {
            const id = checkbox.getAttribute('data-id');
            if (checkbox.checked) {
                selectedMatches.add(id);
            } else {
                selectedMatches.delete(id);
            }
            updateShareButtonText();
        }

        function updateShareButtonText() {
            const count = selectedMatches.size;
            const textBase = dictionary[currentLang].shareBtnBase;
            document.getElementById('share-btn').innerText = `${textBase} (${count})`;
        }

        function toggleLanguage() {
            const oldFilters = Array.from(selectedFilters);
            selectedFilters.clear();

            currentLang = currentLang === 'EN' ? 'PT' : 'EN';
            document.getElementById('lang-toggle').innerText = currentLang === 'EN' ? 'PT 🇧🇷' : 'EN 🇺🇸';
            
            document.getElementById('filter-title').innerText = dictionary[currentLang].filterTitle;
            document.getElementById('matches-title').innerText = dictionary[currentLang].matchesTitle;
            document.getElementById('btn-partidas').innerText = dictionary[currentLang].actionPartidas;

            // Altera os nomes dos botões de países de idioma sem perder as seleções ativas do usuário
            matchesData.forEach(match => {
                const sourcePT = [(match.Team1_PT || "").toUpperCase(), (match.Team2_PT || "").toUpperCase()];
                const sourceEN = [(match.Team1_EN || "").toUpperCase(), (match.Team2_EN || "").toUpperCase()];
                const fEsp = (match.filter_especial || "").toUpperCase();

                oldFilters.forEach(f => {
                    if (f === fEsp && f !== "") selectedFilters.add(f); 
                    if (currentLang === 'EN' && sourcePT.includes(f)) {
                        const idx = sourcePT.indexOf(f);
                        if (idx !== -1 && sourceEN[idx]) selectedFilters.add(sourceEN[idx]);
                    } else if (currentLang === 'PT' && sourceEN.includes(f)) {
                        const idx = sourceEN.indexOf(f);
                        if (idx !== -1 && sourcePT[idx]) selectedFilters.add(sourcePT[idx]);
                    }
                });
            });

            buildFilterButtons();

            if (document.getElementById('screen-matches').style.display !== 'none') {
                renderFilteredMatches();
            }
        }

        function shareToWhatsApp() {
            if (selectedMatches.size === 0) {
                alert(currentLang === 'EN' ? "Please select at least one match!" : "Por favor, selecione pelo menos um jogo primeiro!");
                return;
            }

            let message = `${dictionary[currentLang].greeting}\n`;
            
            matchesData.forEach(match => {
                if (selectedMatches.has(match.ID.toString())) {
                    const matchDate = new Date(match.DateTime_UTC);
                    const weekdayIndex = matchDate.getDay();
                    const weekday = weekdaysMap[currentLang][weekdayIndex];

                    const dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                    const timeStr = matchDate.toLocaleTimeString(locales[currentLang], { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;

                    message += `• ${team1} x ${team2} - ${weekday} ${dateStr} - ${timeStr} - ${match.Stadium || ""}\n`;
                }
            });

            message += `\n${dictionary[currentLang].footerMsg}${GITHUB_PAGES_URL}`;
            
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }

        fetchMatches();
    </script>
</body>
</html>
