<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Match Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #0F3097;
            --bg-darker: #0A226B;
            --card-white: #FFFFFF;
            --accent-neon: #D4FF00;
            --text-dark: #051238;
            --text-muted: #627293;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            background-image: linear-gradient(135deg, var(--bg-blue) 0%, var(--bg-darker) 100%);
            color: var(--card-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 24px 20px 10px;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 6px 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 0px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px 140px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .page-title {
            text-align: center;
            font-size: 1.4rem;
            text-transform: lowercase;
            margin-bottom: 30px;
            color: var(--card-white);
            font-weight: 400;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .filter-box {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: var(--card-white);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.15s ease;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
        }

        .filter-box.active {
            background: var(--card-white);
            color: var(--text-dark);
            border-color: var(--accent-neon);
            font-weight: 900;
        }

        .filter-box.disabled {
            opacity: 0.2;
            cursor: default;
            border-style: dashed;
        }

        .match-list-container {
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-neon);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: lowercase;
        }

        .match-card {
            background: var(--card-white);
            color: var(--text-dark);
            margin-bottom: 14px;
            border-radius: 0px;
            border-left: 6px solid var(--bg-blue);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 18px rgba(5, 18, 56, 0.2);
        }

        .match-card-content {
            flex-grow: 1;
            padding-right: 15px;
        }

        .match-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: lowercase;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .match-teams {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--text-dark);
            text-transform: uppercase;
        }

        .select-check {
            height: 24px;
            width: 24px;
            cursor: pointer;
            accent-color: var(--bg-blue);
        }

        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-darker);
            padding: 24px 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: lowercase;
            cursor: not-allowed;
            width: 100%;
            max-width: 560px;
            border-radius: 0px;
            text-align: center;
            pointer-events: none;
        }

        .action-btn.enabled {
            background: var(--accent-neon);
            color: var(--text-dark);
            border-color: var(--accent-neon);
            font-weight: 900;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <header>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">PT 🇧🇷</button>
    </header>

    <main id="screen-filter">
        <h1 class="page-title" id="filter-title">o que você quer assistir?</h1>
        <div class="filter-grid" id="container-unificado">
            <div class="loading">buscando opções de jogos...</div>
        </div>
    </main>

    <main id="screen-matches" style="display:none;">
        <h1 class="page-title" id="matches-title">selecione</h1>
        <div class="match-list-container" id="matches-container"></div>
    </main>

    <div class="action-bar" id="action-bar-filter">
        <button class="action-btn" onclick="showMatchesScreen()" id="btn-partidas">partidas</button>
    </div>

    <div class="action-bar" id="action-bar-whatsapp" style="display:none;">
        <button class="action-btn" id="share-btn" onclick="shareToWhatsApp()">enviar por whatsapp (0)</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwVe9_mcQPcB6vY7DR05vrs2TAfeey4oytlCf57beKMonV8J-hBdwTT4f6f0rf8C5b9/exec";
        const GITHUB_PAGES_URL = "https://annefrancischini-vc.github.io/my-world-cup-matches/";

        let currentLang = 'PT';
        let matchesData = [];
        const selectedFilters = new Set();
        const selectedMatches = new Set();

        const dictionary = {
            EN: { filterTitle: "what do you want to watch?", matchesTitle: "select", actionPartidas: "matches", greeting: "Hello! Let's watch these matches?", footerMsg: "Plan yours here: ", shareBtnBase: "send via whatsapp" },
            PT: { filterTitle: "o que você quer assistir?", matchesTitle: "selecione", actionPartidas: "partidas", greeting: "Olá! Vamos assistir a esses jogos?", footerMsg: "Monte a sua programação aqui: ", shareBtnBase: "enviar por whatsapp" }
        };

        const locales = { EN: 'en-US', PT: 'pt-BR' };
        const weekdaysMap = {
            EN: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
            PT: ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado']
        };

        async function fetchMatches() {
            try {
                const response = await fetch(API_URL);
                matchesData = await response.json();
                buildFilterButtons();
            } catch (error) {
                console.error(error);
                document.getElementById('container-unificado').innerHTML = "<div class='loading'>erro ao carregar dados da aba app.</div>";
            }
        }

        function buildFilterButtons() {
            const filterSet = new Set();

            matchesData.forEach(match => {
                const hasPlayer = Number(match.has_player);
                
                if (currentLang === 'PT') {
                    if (hasPlayer === 1 && match.filter_especial) {
                        filterSet.add(match.filter_especial.toUpperCase().trim());
                    } else {
                        if (match.Team1_PT) filterSet.add(match.Team1_PT.toUpperCase().trim());
                        if (match.Team2_PT) filterSet.add(match.Team2_PT.toUpperCase().trim());
                    }
                } else {
                    if (hasPlayer === 1 && match.filter_especial) {
                        filterSet.add(match.filter_especial.toUpperCase().trim());
                    } else {
                        if (match.Team1_EN) filterSet.add(match.Team1_EN.toUpperCase().trim());
                        if (match.Team2_EN) filterSet.add(match.Team2_EN.toUpperCase().trim());
                    }
                }
            });

            const container = document.getElementById('container-unificado');
            container.innerHTML = '';
            
            const sortedFilters = Array.from(filterSet).sort();
            
            sortedFilters.forEach(filterName => {
                const btn = document.createElement('div');
                btn.className = `filter-box ${selectedFilters.has(filterName) ? 'active' : ''}`;
                btn.innerText = filterName;
                btn.onclick = () => toggleFilter(filterName, btn);
                container.appendChild(btn);
            });

            const remainder = sortedFilters.length % 3;
            if (remainder !== 0) {
                const needed = 3 - remainder;
                for (let i = 0; i < needed; i++) {
                    const blank = document.createElement('div');
                    blank.className = 'filter-box disabled';
                    blank.innerText = '...';
                    container.appendChild(blank);
                }
            }
            validateFilterButton();
        }

        function toggleFilter(value, element) {
            if (selectedFilters.has(value)) {
                selectedFilters.delete(value);
                element.classList.remove('active');
            } else {
                selectedFilters.add(value);
                element.classList.add('active');
            }
            validateFilterButton();
        }

        function validateFilterButton() {
            const btn = document.getElementById('btn-partidas');
            if (selectedFilters.size > 0) {
                btn.classList.add('enabled');
            } else {
                btn.classList.remove('enabled');
            }
        }

        function showMatchesScreen() {
            document.getElementById('screen-filter').style.display = 'none';
            document.getElementById('action-bar-filter').style.display = 'none';
            document.getElementById('screen-matches').style.display = 'flex';
            document.getElementById('action-bar-whatsapp').style.display = 'flex';
            renderFilteredMatches();
        }

        function renderFilteredMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            let hasMatches = false;

            matchesData.forEach(match => {
                let showMatch = false;

                const t1PT = String(match.Team1_PT || "").toUpperCase().trim();
                const t2PT = String(match.Team2_PT || "").toUpperCase().trim();
                const t1EN = String(match.Team1_EN || "").toUpperCase().trim();
                const t2EN = String(match.Team2_EN || "").toUpperCase().trim();
                const fEspecial = String(match.filter_especial || "").toUpperCase().trim();

                for (let filter of selectedFilters) {
                    if (t1PT === filter || t2PT === filter || t1EN === filter || t2EN === filter || fEspecial === filter) {
                        showMatch = true;
                        break; 
                    }
                }

                if (showMatch) {
                    hasMatches = true;
                    
                    let dateStr = "A definir";
                    let weekdayShort = "---";
                    const rawDate = match.DateTime_UTC || match.DateTime_U;

                    if (rawDate) {
                        const matchDate = new Date(rawDate);
                        if (!isNaN(matchDate.getTime())) {
                            const weekdayIndex = matchDate.getDay();
                            weekdayShort = weekdaysMap[currentLang][weekdayIndex].substring(0, 3);
                            dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                        }
                    }
                    
                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;
                    const matchId = match.ID || "";

                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="match-card-content">
                            <div class="match-meta">${weekdayShort} - ${dateStr} - ${match.Stadium || ""}</div>
                            <div class="match-teams">${team1} VS <span style="text-transform:lowercase; font-weight:700;">${team2}</span></div>
                        </div>
                        <input type="checkbox" class="select-check" data-id="${matchId}" ${selectedMatches.has(matchId.toString()) ? 'checked' : ''} onchange="handleSelect(this)">
                    `;
                    container.appendChild(card);
                }
            });

            if (!hasMatches) {
                container.innerHTML = `<div class="loading">nenhuma partida encontrada.</div>`;
            }
            validateWhatsappButton();
        }

        function handleSelect(checkbox) {
            const id = checkbox.getAttribute('data-id');
            if (checkbox.checked) selectedMatches.add(id);
            else selectedMatches.delete(id);
            validateWhatsappButton();
        }

        function validateWhatsappButton() {
            const btn = document.getElementById('share-btn');
            btn.innerText = `${dictionary[currentLang].shareBtnBase} (${selectedMatches.size})`;
            if (selectedMatches.size > 0) {
                btn.classList.add('enabled');
            } else {
                btn.classList.remove('enabled');
            }
        }

        function toggleLanguage() {
            selectedFilters.clear();
            selectedMatches.clear();

            currentLang = currentLang === 'EN' ? 'PT' : 'EN';
            document.getElementById('lang-toggle').innerText = currentLang === 'EN' ? 'PT 🇧🇷' : 'EN 🇺🇸';
            
            document.getElementById('filter-title').innerText = dictionary[currentLang].filterTitle;
            document.getElementById('matches-title').innerText = dictionary[currentLang].matchesTitle;
            document.getElementById('btn-partidas').innerText = dictionary[currentLang].actionPartidas;

            buildFilterButtons();
            if (document.getElementById('screen-matches').style.display !== 'none') {
                renderFilteredMatches();
            }
        }

        function shareToWhatsApp() {
            if (selectedMatches.size === 0) return;

            let message = `${dictionary[currentLang].greeting}\n`;
            
            matchesData.forEach(match => {
                const matchId = match.ID || "";
                if (selectedMatches.has(matchId.toString())) {
                    let dateStr = "";
                    let weekday = "";
                    const rawDate = match.DateTime_UTC || match.DateTime_U;

                    if (rawDate) {
                        const matchDate = new Date(rawDate);
                        if (!isNaN(matchDate.getTime())) {
                            weekday = weekdaysMap[currentLang][matchDate.getDay()];
                            dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                        }
                    }

                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;

                    message += `• ${team1} x ${team2} - ${weekday} ${dateStr} - ${match.Stadium || ""}\n`;
                }
            });

            message += `\n${dictionary[currentLang].footerMsg}${GITHUB_PAGES_URL}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        fetchMatches();
    </script>
</body>
</html>
