<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Match Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #0A1B52;       /* Azul marinho profundo e moderno */
            --bg-gradient: linear-gradient(135deg, #0A1B52 0%, #050D2B 100%);
            --card-white: #FFFFFF;
            --accent-neon: #CCFF00;   /* Amarelo/Verde limão elétrico vibrante */
            --text-dark: #0F172A;     /* Tom de cinza escuro premium para leitura */
            --text-muted: #64748B;    /* Cinza suave para metadados */
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-blue);
            background-image: var(--bg-gradient);
            color: var(--card-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 24px 20px 10px;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: var(--card-white);
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px; /* Botão oval moderno */
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .lang-btn:hover {
            border-color: var(--accent-neon);
            color: var(--accent-neon);
            background: rgba(204, 255, 0, 0.05);
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 10px 20px 140px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .page-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            color: rgba(255, 255, 255, 0.95);
        }

        /* Grelha de Filtros Estilo Card Moderno */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .filter-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            color: rgba(255, 255, 255, 0.8);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px; /* Cantos arredondados modernos */
        }

        .filter-box:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.25);
            color: var(--card-white);
        }

        .filter-box.active {
            background: var(--card-white);
            color: var(--text-dark);
            border-color: var(--accent-neon);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 0 15px rgba(204, 255, 0, 0.15);
            font-weight: 700;
            transform: translateY(-2px);
        }

        .filter-box.disabled {
            opacity: 0.15;
            cursor: default;
            border-style: dashed;
            transform: none !important;
        }

        .match-list-container {
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-neon);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Card de Partidas Modernizado */
        .match-card {
            background: var(--card-white);
            color: var(--text-dark);
            margin-bottom: 14px;
            border-radius: 12px; /* Arredondado suave */
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px -10px rgba(2, 8, 38, 0.5);
            transition: transform 0.2s ease;
        }

        .match-card-content {
            flex-grow: 1;
            padding-right: 15px;
        }

        .match-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .match-teams {
            font-size: 1.2rem;
            font-weight: 800; /* Destaque apenas nos times */
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }

        /* Checkbox Redonda e Elegante */
        .select-check {
            height: 24px;
            width: 24px;
            cursor: pointer;
            accent-color: #0F3097;
            border-radius: 50%;
        }

        /* Barra de Ações Inferior Suspensa */
        .action-bar {
            position: fixed;
            bottom: 24px; /* Flutuando levemente acima do fundo */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 560px;
            background: rgba(10, 27, 82, 0.85);
            padding: 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: not-allowed;
            width: 100%;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .action-btn.enabled {
            background: var(--accent-neon);
            color: #0A1B52;
            border-color: var(--accent-neon);
            box-shadow: 0 8px 20px -4px rgba(204, 255, 0, 0.4);
            cursor: pointer;
            pointer-events: auto;
        }

        .action-btn.enabled:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">PT 🇧🇷</button>
    </header>

    <main id="screen-filter">
        <h1 class="page-title" id="filter-title">o que você quer assistir?</h1>
        <div class="filter-grid" id="container-unificado">
            <div class="loading">buscando opções de jogos...</div>
        </div>
    </main>

    <main id="screen-matches" style="display:none;">
        <h1 class="page-title" id="matches-title">selecione as partidas</h1>
        <div class="match-list-container" id="matches-container"></div>
    </main>

    <div class="action-bar" id="action-bar-filter">
        <button class="action-btn" onclick="showMatchesScreen()" id="btn-partidas">partidas</button>
    </div>

    <div class="action-bar" id="action-bar-whatsapp" style="display:none;">
        <button class="action-btn" id="share-btn" onclick="shareToWhatsApp()">enviar por whatsapp (0)</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwVe9_mcQPcB6vY7DR05vrs2TAfeey4oytlCf57beKMonV8J-hBdwTT4f6f0rf8C5b9/exec";
        const GITHUB_PAGES_URL = "https://annefrancischini-vc.github.io/my-world-cup-matches/";

        let currentLang = 'PT';
        let matchesData = [];
        const selectedFilters = new Set();
        const selectedMatches = new Set();

        const fixedOptions = [
            { PT: "ALEMANHA", EN: "GERMANY", type: "country" },
            { PT: "ARGENTINA", EN: "ARGENTINA", type: "country" },
            { PT: "URUGUAI", EN: "URUGUAY", type: "country" },
            { PT: "BRASIL", EN: "BRAZIL", type: "country" },
            { PT: "BÉLGICA", EN: "BELGIUM", type: "country" },
            { PT: "DAVIES", EN: "DAVIES", type: "player" },
            { PT: "ESPANHA", EN: "SPAIN", type: "country" },
            { PT: "FRANÇA", EN: "FRANCE", type: "country" },
            { PT: "GYÖKERES", EN: "GYÖKERES", type: "player" },
            { PT: "HAALAND", EN: "HAALAND", type: "player" },
            { PT: "HOLANDA", EN: "NETHERLANDS", type: "country" },
            { PT: "INGLATERRA", EN: "ENGLAND", type: "country" },
            { PT: "LUIZ DIAS", EN: "LUIZ DIAS", type: "player" },
            { PT: "MARROCOS", EN: "MOROCCO", type: "country" },
            { PT: "MODRIC", EN: "MODRIC", type: "player" },
            { PT: "PORTUGAL", EN: "PORTUGAL", type: "country" },
            { PT: "SALAH", EN: "SALAH", type: "player" },
            { PT: "SON", EN: "SON", type: "player" }
        ];

        const dictionary = {
            EN: { filterTitle: "what do you want to watch?", matchesTitle: "select the matches", actionPartidas: "view matches", greeting: "Hello! Let's watch these matches?\n", footerMsg: "Plan yours here: ", shareBtnBase: "share on whatsapp" },
            PT: { filterTitle: "o que você quer assistir?", matchesTitle: "selecione as partidas", actionPartidas: "ver partidas", greeting: "Olá! Vamos assistir a esses jogos?\n", footerMsg: "Monte a sua programação aqui: ", shareBtnBase: "enviar por whatsapp" }
        };

        const locales = { EN: 'en-US', PT: 'pt-BR' };
        const weekdaysMap = {
            EN: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
            PT: ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado']
        };

        async function fetchMatches() {
            try {
                const response = await fetch(API_URL);
                matchesData = await response.json();
                buildFilterButtons();
            } catch (error) {
                console.error(error);
                document.getElementById('container-unificado').innerHTML = "<div class='loading'>erro ao carregar dados.</div>";
            }
        }

        function buildFilterButtons() {
            const container = document.getElementById('container-unificado');
            container.innerHTML = '';

            fixedOptions.forEach(opt => {
                const displayName = currentLang === 'PT' ? opt.PT : opt.EN;
                const btn = document.createElement('div');
                btn.className = `filter-box ${selectedFilters.has(displayName) ? 'active' : ''}`;
                btn.innerText = displayName;
                btn.onclick = () => toggleFilter(displayName, btn);
                container.appendChild(btn);
            });

            const remainder = fixedOptions.length % 3;
            if (remainder !== 0) {
                const needed = 3 - remainder;
                for (let i = 0; i < needed; i++) {
                    const blank = document.createElement('div');
                    blank.className = 'filter-box disabled';
                    blank.innerText = '...';
                    container.appendChild(blank);
                }
            }
            validateFilterButton();
        }

        function toggleFilter(value, element) {
            if (selectedFilters.has(value)) {
                selectedFilters.delete(value);
                element.classList.remove('active');
            } else {
                selectedFilters.add(value);
                element.classList.add('active');
            }
            validateFilterButton();
        }

        function validateFilterButton() {
            const btn = document.getElementById('btn-partidas');
            if (selectedFilters.size > 0) {
                btn.classList.add('enabled');
            } else {
                btn.classList.remove('enabled');
            }
        }

        function showMatchesScreen() {
            document.getElementById('screen-filter').style.display = 'none';
            document.getElementById('action-bar-filter').style.display = 'none';
            document.getElementById('screen-matches').style.display = 'flex';
            document.getElementById('action-bar-whatsapp').style.display = 'flex';
            renderFilteredMatches();
        }

        function renderFilteredMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            let hasMatches = false;

            matchesData.forEach(match => {
                let showMatch = false;

                const t1PT = String(match.Team1_PT || "").toUpperCase().trim();
                const t2PT = String(match.Team2_PT || "").toUpperCase().trim();
                const t1EN = String(match.Team1_EN || "").toUpperCase().trim();
                const t2EN = String(match.Team2_EN || "").toUpperCase().trim();
                const fEspecial = String(match.filter_especial || "").toUpperCase().trim();

                for (let filter of selectedFilters) {
                    const foundOpt = fixedOptions.find(o => o.PT === filter || o.EN === filter);
                    if (!foundOpt) continue;

                    if (foundOpt.type === "player") {
                        if (fEspecial === foundOpt.PT) {
                            showMatch = true;
                            break;
                        }
                    } else {
                        if (t1PT === foundOpt.PT || t2PT === foundOpt.PT || t1EN === foundOpt.EN || t2EN === foundOpt.EN) {
                            showMatch = true;
                            break;
                        }
                    }
                }

                if (showMatch) {
                    hasMatches = true;
                    
                    let dateStr = "A definir";
                    let timeStr = "--:--";
                    let weekdayShort = "---";
                    const rawDate = match.DateTime_UTC || match.DateTime_U;

                    if (rawDate) {
                        const matchDate = new Date(rawDate);
                        if (!isNaN(matchDate.getTime())) {
                            const weekdayIndex = matchDate.getDay();
                            // Captura abreviação da semana (ex: seg, ter, qua)
                            weekdayShort = weekdaysMap[currentLang][weekdayIndex].substring(0, 3).toLowerCase();
                            dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                            // Captura horário no fuso do aparelho do usuário (Formato 24h)
                            timeStr = matchDate.toLocaleTimeString(locales[currentLang], { hour: '2-digit', minute: '2-digit', hour12: false });
                        }
                    }
                    
                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;
                    const matchId = match.ID || "";

                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="match-card-content">
                            <div class="match-meta">${weekdayShort}, ${dateStr} - ${timeStr} • ${match.Stadium || ""}</div>
                            <div class="match-teams">${team1} × ${team2}</div>
                        </div>
                        <input type="checkbox" class="select-check" data-id="${matchId}" ${selectedMatches.has(matchId.toString()) ? 'checked' : ''} onchange="handleSelect(this)">
                    `;
                    container.appendChild(card);
                }
            });

            if (!hasMatches) {
                container.innerHTML = `<div class="loading">nenhuma partida encontrada.</div>`;
            }
            validateWhatsappButton();
        }

        function handleSelect(checkbox) {
            const id = checkbox.getAttribute('data-id');
            if (checkbox.checked) selectedMatches.add(id);
            else selectedMatches.delete(id);
            validateWhatsappButton();
        }

        function validateWhatsappButton() {
            const btn = document.getElementById('share-btn');
            btn.innerText = `${dictionary[currentLang].shareBtnBase} (${selectedMatches.size})`;
            if (selectedMatches.size > 0) {
                btn.classList.add('enabled');
            } else {
                btn.classList.remove('enabled');
            }
        }

        function toggleLanguage() {
            const oldFilters = Array.from(selectedFilters);
            selectedFilters.clear();
            selectedMatches.clear();

            currentLang = currentLang === 'EN' ? 'PT' : 'EN';
            document.getElementById('lang-toggle').innerText = currentLang === 'EN' ? 'PT 🇧🇷' : 'EN 🇺🇸';
            
            document.getElementById('filter-title').innerText = dictionary[currentLang].filterTitle;
            document.getElementById('matches-title').innerText = dictionary[currentLang].matchesTitle;
            document.getElementById('btn-partidas').innerText = dictionary[currentLang].actionPartidas;

            oldFilters.forEach(f => {
                const found = fixedOptions.find(o => o.PT === f || o.EN === f);
                if (found) {
                    selectedFilters.add(currentLang === 'PT' ? found.PT : found.EN);
                }
            });

            buildFilterButtons();
            if (document.getElementById('screen-matches').style.display !== 'none') {
                renderFilteredMatches();
            }
        }

        // DESIGN REESTRUTURADO DO ZAP CONFORME O SEU MODELO SOLICITADO
        function shareToWhatsApp() {
            if (selectedMatches.size === 0) return;

            let message = `${dictionary[currentLang].greeting}\n`;
            
            matchesData.forEach(match => {
                const matchId = match.ID || "";
                if (selectedMatches.has(matchId.toString())) {
                    let dateStr = "";
                    let timeStr = "";
                    let weekday = "";
                    const rawDate = match.DateTime_UTC || match.DateTime_U;

                    if (rawDate) {
                        const matchDate = new Date(rawDate);
                        if (!isNaN(matchDate.getTime())) {
                            weekday = weekdaysMap[currentLang][matchDate.getDay()];
                            dateStr = matchDate.toLocaleDateString(locales[currentLang], { day: 'numeric', month: 'numeric' });
                            timeStr = matchDate.toLocaleTimeString(locales[currentLang], { hour: '2-digit', minute: '2-digit', hour12: false });
                        }
                    }

                    const team1 = currentLang === 'EN' ? match.Team1_EN : match.Team1_PT;
                    const team2 = currentLang === 'EN' ? match.Team2_EN : match.Team2_PT;

                    // Formato idêntico ao solicitado com Emojis e quebras limpas
                    message += `📅 ${weekday}, ${dateStr} - ${timeStr}\n`;
                    message += `⚽ ${team1} × ${team2}\n\n`;
                }
            });

            message += `${dictionary[currentLang].footerMsg}${GITHUB_PAGES_URL}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        fetchMatches();
    </script>
</body>
</html>
