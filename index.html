<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .card-active { border-color: #3B82F6; background-color: #EFF6FF; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

  <div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight sm:text-4xl">🏆 Central da Copa 2026</h1>
      <p class="mt-2 text-lg text-gray-600">Selecione um filtro para ver o calendário cronológico de jogos</p>
    </header>

    <!-- 🌟 SEÇÃO: CARDS DE JOGADORES DESTAQUE -->
    <div class="mb-6">
      <h2 class="text-xl font-bold text-gray-700 mb-3 flex items-center">⭐ Jogadores em Destaque</h2>
      <div id="players-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
        <!-- Inserido dinamicamente -->
      </div>
    </div>

    <!-- 🏴 SEÇÃO: CARDS DE SELEÇÕES -->
    <div class="mb-8">
      <h2 class="text-xl font-bold text-gray-700 mb-3 flex items-center">🌍 Seleções Filtradas</h2>
      <div id="teams-container" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3">
        <!-- Inserido dinamicamente -->
      </div>
    </div>

    <!-- 📅 LISTA DE JOGOS -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="px-6 py-4 bg-gray-900 flex justify-between items-center text-white">
        <h3 id="table-title" class="font-bold text-lg">📅 Todas as Partidas</h3>
        <button onclick="limparFiltros()" class="text-sm bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded transition">Ver Todos</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-semibold tracking-wider border-b border-gray-200">
              <th class="px-6 py-3 text-center w-16">ID</th>
              <th class="px-6 py-3">Data & Hora (UTC)</th>
              <th class="px-6 py-3">Estádio</th>
              <th class="px-6 py-3 text-center">Grupo</th>
              <th class="px-6 py-3 text-right">Confronto</th>
            </tr>
          </thead>
          <tbody id="matches-body" class="divide-y divide-gray-100">
            <tr>
              <td colspan="5" class="px-6 py-12 text-center text-gray-500">Carregando calendário oficial...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let cacheDados = null;
    let filtroAtivo = { tipo: null, valor: null };

    window.onload = function() {
      google.script.run.withSuccessHandler(renderizarInterface).getAppData();
    };

    function renderizarInterface(dados) {
      cacheDados = dados;
      
      // Renderizar Jogadores
      const pContainer = document.getElementById('players-container');
      pContainer.innerHTML = '';
      dados.uniquePlayers.forEach(p => {
        pContainer.innerHTML += `
          <div onclick="filtrar('player', '${p}', this)" class="bg-white border border-gray-200 p-4 rounded-xl cursor-pointer text-center hover:shadow-sm transition font-semibold capitalize text-blue-600">
            🏃‍♂️ ${p}
          </div>`;
      });

      // Renderizar Seleções
      const tContainer = document.getElementById('teams-container');
      tContainer.innerHTML = '';
      dados.uniqueTeams.forEach(t => {
        tContainer.innerHTML += `
          <div onclick="filtrar('team', '${t}', this)" class="bg-white border border-gray-200 p-3 rounded-lg cursor-pointer text-center hover:shadow-sm transition text-sm font-medium">
            ⚽ ${t}
          </div>`;
      });

      atualizarTabela();
    }

    function filtrar(tipo, valor, elemento) {
      // Remove destaques antigos
      document.querySelectorAll('#players-container > div, #teams-container > div').forEach(el => {
        el.classList.remove('card-active');
      });
      
      // Aplica novo filtro ou limpa se clicar no mesmo
      if (filtroAtivo.tipo === tipo && filtroAtivo.valor === valor) {
        limparFiltros();
      } else {
        filtroAtivo = { tipo: tipo, valor: valor };
        elemento.classList.add('card-active');
        document.getElementById('table-title').innerText = `📅 Jogos de: ${valor.toUpperCase()}`;
        atualizarTabela();
      }
    }

    function limparFiltros() {
      filtroAtivo = { tipo: null, valor: null };
      document.querySelectorAll('#players-container > div, #teams-container > div').forEach(el => {
        el.classList.remove('card-active');
      });
      document.getElementById('table-title').innerText = '📅 Todas as Partidas';
      atualizarTabela();
    }

    function formatarData(isoString) {
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return isoString;
      return d.toLocaleDateString('pt-BR') + ' - ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) + ' UTC';
    }

    function atualizarTabela() {
      if (!cacheDados) return;
      
      const tbody = document.getElementById('matches-body');
      tbody.innerHTML = '';

      // Executa o filtro lógico
      let jogosFiltrados = cacheDados.matches;
      if (filtroAtivo.tipo === 'team') {
        jogosFiltrados = cacheDados.matches.filter(j => 
          j.team1.toLowerCase() === filtroAtivo.valor.toLowerCase() || 
          j.team2.toLowerCase() === filtroAtivo.valor.toLowerCase()
        );
      } else if (filtroAtivo.tipo === 'player') {
        jogosFiltrados = cacheDados.matches.filter(j => j.keyword === filtroAtivo.valor.toLowerCase());
      }

      if (jogosFiltrados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Nenhum jogo encontrado para este filtro.</td></tr>`;
        return;
      }

      // Renderiza as linhas (já ordenadas cronologicamente pelo Apps Script)
      jogosFiltrados.forEach(j => {
        tbody.innerHTML += `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 text-center font-bold text-gray-400 text-sm">${j.id}</td>
            <td class="px-6 py-4 text-sm font-medium text-gray-600">${formatarData(j.dateTime)}</td>
            <td class="px-6 py-4 text-sm text-gray-500">${j.stadium}</td>
            <td class="px-6 py-4 text-center"><span class="bg-gray-200 text-gray-800 text-xs px-2 py-1 rounded font-bold">${j.group}</span></td>
            <td class="px-6 py-4 text-right font-semibold text-gray-900">
              ${j.team1} <span class="text-gray-400 font-normal">vs</span> ${j.team2}
            </td>
          </tr>
        `;
      });
    }
  </script>
</body>
</html>
