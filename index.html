<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Match Planner</title>
    <style>
        /* Modern Premium Sports UI Palette */
        :root {
            --brazil-blue-glow: #0a58ca;
            --neon-lime: #ccff00; 
            --bg-gradient: linear-gradient(135deg, #020b18 0%, #051d3b 100%);
            --glass-card: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px 16px; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        h2 { 
            margin: 0; 
            font-size: 22px; 
            font-weight: 800;
            background: linear-gradient(90deg, #ffffff, var(--neon-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 99px;
            cursor: pointer;
        }

        .intro-text { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin-bottom: 15px; }
        
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-lime);
            margin: 10px 0 10px 0;
            font-weight: 700;
        }

        /* 👑 CONTROLE ESTRITO DE TELAS (Isola completamente o conteúdo) */
        .app-screen {
            display: none !important;
        }
        .app-screen.active {
            display: block !important;
        }

        /* Botão discreto para voltar */
        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0;
        }
        .back-btn:hover {
            color: var(--neon-lime);
        }

        /* Grid de Cards de Filtro Dinâmicos (Tela 1) */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 120px;
        }

        .category-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            text-transform: capitalize;
            transition: all 0.2s ease;
        }

        .category-card:hover {
            border-color: rgba(204, 255, 0, 0.5);
        }

        .category-card.active {
            background: rgba(204, 255, 0, 0.15);
            border-color: var(--neon-lime);
            color: var(--neon-lime);
            box-shadow: inset 0 0 12px rgba(204, 255, 0, 0.1);
        }

        /* Lista de partidas (Tela 2) */
        #matchList { display: flex; flex-direction: column; gap: 12px; margin-bottom: 120px; }

        .match-card { 
            background: var(--glass-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            border: 1px solid var(--glass-border);
        }

        .match-card input[type="checkbox"] { 
            margin-right: 16px; 
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--neon-lime);
        }

        .match-info { flex-grow: 1; }
        .teams { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .meta-data { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
        
        .badge-group {
            display: inline-block;
            background: rgba(10, 88, 202, 0.2);
            color: #79a6ff;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 6px;
            border: 1px solid rgba(10, 88, 202, 0.3);
        }

        /* Container Flutuante do Rodapé */
        .action-btn-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, #020b18 30%);
            padding: 24px 16px; display: flex; justify-content: center;
            max-width: 500px; margin: 0 auto; box-sizing: border-box; z-index: 100;
        }

        button.action-btn { 
            border: none; padding: 14px 28px; 
            font-size: 16px; font-weight: 700; border-radius: 99px; cursor: pointer; width: 100%; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.2s ease;
        }

        /* Estilo do Botão do Passo 1 */
        button.action-btn.next-step-style {
            background: var(--neon-lime);
            color: #020b18;
            box-shadow: 0 8px 24px rgba(204, 255, 0, 0.2);
        }

        /* Estilo do Botão do WhatsApp */
        button.action-btn.whatsapp-style {
            background: #25D366; 
            color: white;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
        }

        button.action-btn img { width: 22px; height: 22px; }
    </style>
</head>
<body>

    <header>
        <h2 id="appTitle">🏆 2026 Match Planner</h2>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">PT 🇧🇷</button>
    </header>

    <div id="mainContainer">
        
        <div id="screenFilters" class="app-screen active">
            <div class="section-title" id="step1Title">Selecione o que você quer assistir</div>
            <p class="intro-text" id="filterIntro">Escolha as seleções ou craques favoritos nos cards abaixo.</p>
            <div class="filter-grid" id="filterCardsContainer">
                </div>
        </div>

        <div id="screenMatches" class="app-screen">
            <button class="back-btn" onclick="navigateToScreen(1)">← <span id="backBtnText">Alterar filtros</span></button>
            <div class="section-title" id="step2Title">Selecione as partidas</div>
            <p class="intro-text" id="editIntro">Marque os jogos abaixo para montar sua agenda.</p>
            <div id="matchList">⚽ Buscando confrontos...</div>
        </div>

    </div>

    <div class="action-btn-container">
        <button class="action-btn next-step-style" onclick="goToMatchesScreen()" id="footerActionBtn">
            <span id="btnText">Ver Jogos</span>
        </button>
    </div>

    <script>
        // ⚠️ SUAS CONFIGURAÇÕES TÉCNICAS REAIS
        const API_URL = "https://script.google.com/macros/s/AKfycbxaCgzAfugHU1lwiH8avtAXAwPj4zJQ5ZKfl6vcpAZZXlzwAIQs-Cay-cUQfPtb-Xwb/exec"; 
        const GITHUB_PAGES_URL = "https://annefrancischini-vc.github.io/my-world-cup-matches/"; 

        let allMatches = [];
        let uniqueCategories = [];
        let selectedFilters = new Set();
        let currentLang = 'pt'; // Definido PT-BR como inicial nativo
        let activeScreen = 1;

        const dictionary = {
            en: {
                title: "🏆 2026 Match Planner",
                step1: "Select what you want to watch",
                filterIntro: "Choose your favorite teams or star players below.",
                step2: "Select the matches",
                editIntro: "Check the boxes for the games you want to save.",
                backBtn: "Back to choices",
                btnViewMatches: "View Games",
                btnShareWhatsApp: "Share on WhatsApp",
                alertSelectFilter: "Please select at least one choice first!",
                alertSelectMatch: "Please select at least one match first!",
                wpGreeting: "Hello! Let's watch these matches?\n",
                wpFooter: "\nPlan yours here: ",
                noMatches: "No matches found for the selected choices."
            },
            pt: {
                title: "🏆 Agenda Copa 2026",
                step1: "Selecione o que você quer assistir",
                filterIntro: "Escolha as seleções ou craques favoritos nos cards abaixo.",
                step2: "Selecione as partidas",
                editIntro: "Marque os jogos abaixo para montar sua agenda.",
                backBtn: "Voltar para escolhas",
                btnViewMatches: "Ver Jogos",
                btnShareWhatsApp: "Compartilhar no WhatsApp",
                alertSelectFilter: "Por favor, selecione pelo menos uma opção primeiro!",
                alertSelectMatch: "Por favor, selecione pelo menos um jogo!",
                wpGreeting: "Olá! Bora assistir a esses jogos?\n",
                wpFooter: "\nMonte sua agenda aqui: ",
                noMatches: "Nenhum jogo encontrado para os filtros selecionados."
            }
        };

        const weekdays = {
            en: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            pt: ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"]
        };

        async function init() {
            updateUI();
            try {
                const response = await fetch(API_URL);
                allMatches = await response.json();
                extractCategoriesFromData();
                renderFilterCards();
            } catch (error) {
                document.getElementById('filterCardsContainer').innerHTML = `<div style="color:#ff4a4a; text-align:center; grid-column:1/-1;">⚠️ Erro de conexão com o banco de dados.</div>`;
            }
        }

        function extractCategoriesFromData() {
            let categoriesSet = new Set();
            allMatches.forEach(m => {
                if (m.keywords) {
                    m.keywords.split(',').forEach(keyword => {
                        let cleanKeyword = keyword.trim().toLowerCase();
                        if (cleanKeyword) categoriesSet.add(cleanKeyword);
                    });
                }
            });
            uniqueCategories = Array.from(categoriesSet).sort();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'pt' : 'en';
            document.getElementById('langBtn').innerText = currentLang === 'en' ? "PT 🇧🇷" : "EN 🇺🇸";
            updateUI();
            if (activeScreen === 2) renderSchedule();
        }

        function updateUI() {
            document.getElementById('appTitle').innerText = dictionary[currentLang].title;
            document.getElementById('step1Title').innerText = dictionary[currentLang].step1;
            document.getElementById('filterIntro').innerText = dictionary[currentLang].filterIntro;
            document.getElementById('step2Title').innerText = dictionary[currentLang].step2;
            document.getElementById('editIntro').innerText = dictionary[currentLang].editIntro;
            document.getElementById('backBtnText').innerText = dictionary[currentLang].backBtn;
            
            const actionBtn = document.getElementById('footerActionBtn');
            if (activeScreen === 1) {
                document.getElementById('btnText').innerText = dictionary[currentLang].btnViewMatches;
            } else {
                document.getElementById('btnText').innerText = dictionary[currentLang].btnShareWhatsApp;
            }
        }

        function renderFilterCards() {
            const container = document.getElementById('filterCardsContainer');
            container.innerHTML = '';
            uniqueCategories.forEach(category => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerText = category;
                card.onclick = () => handleCardClick(category, card);
                container.appendChild(card);
            });
        }

        function handleCardClick(category, cardElement) {
            if (selectedFilters.has(category)) {
                selectedFilters.delete(category);
                cardElement.classList.remove('active');
            } else {
                selectedFilters.add(category);
                cardElement.classList.add('active');
            }
        }

        function navigateToScreen(screenNumber) {
            activeScreen = screenNumber;
            const btn = document.getElementById('footerActionBtn');
            
            if (screenNumber === 1) {
                document.getElementById('screenMatches').classList.remove('active');
                document.getElementById('screenFilters').classList.add('active');
                
                btn.className = "action-btn next-step-style";
                btn.onclick = goToMatchesScreen;
                const img = btn.querySelector('img');
                if (img) img.remove();
            } else {
                document.getElementById('screenFilters').classList.remove('active');
                document.getElementById('screenMatches').classList.add('active');
                
                btn.className = "action-btn whatsapp-style";
                btn.onclick = shareOnWhatsApp;
                
                if (!btn.querySelector('img')) {
                    const img = document.createElement('img');
                    img.src = "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";
                    img.alt = "WhatsApp";
                    btn.insertBefore(img, btn.firstChild);
                }
            }
            updateUI();
        }

        function goToMatchesScreen() {
            if (selectedFilters.size === 0) {
                alert(dictionary[currentLang].alertSelectFilter);
                return;
            }
            renderSchedule();
            navigateToScreen(2);
        }

        function getLocalTimeData(isoString) {
            const dateObj = new Date(isoString);
            const weekday = weekdays[currentLang][dateObj.getDay()];
            const localDate = dateObj.toLocaleDateString(currentLang === 'en' ? 'en-US' : 'pt-BR', { month: 'numeric', day: 'numeric' });
            const localTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            return { weekday, localDate, localTime };
        }

        function renderSchedule() {
            let html = '';
            allMatches.forEach(m => {
                const home = currentLang === 'en' ? m.team1_en : m.team1_pt;
                const away = currentLang === 'en' ? m.team2_en : m.team2_pt;
                const timeData = getLocalTimeData(m.datetime_utc);
                const cardKeywords = `${(m.keywords || '').toLowerCase()} ${home.toLowerCase()} ${away.toLowerCase()}`;

                let matchesFilter = false;
                selectedFilters.forEach(f => {
                    if (cardKeywords.includes(f)) matchesFilter = true;
                });

                if (matchesFilter) {
                    html += `
                        <div class="match-card">
                            <input type="checkbox" value="${m.id}" class="match-cb" id="match-${m.id}">
                            <div class="match-info">
                                <div class="teams">${home} × ${away}</div>
                                <div class="meta-data">
                                    📅 <strong>${timeData.weekday}</strong>, ${timeData.localDate} | ⏰ ${timeData.localTime}<br>
                                    📍 ${m.stadium} <span class="badge-group">${m.group}</span>
                                </div>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('matchList').innerHTML = html || `<div style="text-align:center; color: var(--text-secondary); padding: 20px;">${dictionary[currentLang].noMatches}</div>`;
        }

        function shareOnWhatsApp() {
            const checkboxes = document.querySelectorAll('.match-cb:checked');
            if (checkboxes.length === 0) {
                alert(dictionary[currentLang].alertSelectMatch);
                return;
            }

            let message = dictionary[currentLang].wpGreeting;
            checkboxes.forEach(cb => {
                const match = allMatches.find(m => String(m.id) === String(cb.value));
                if (match) {
                    const home = currentLang === 'en' ? match.team1_en : match.team1_pt;
                    const away = currentLang === 'en' ? match.team2_en : match.team2_pt;
                    const timeData = getLocalTimeData(match.datetime_utc);
                    message += `• ${timeData.weekday}, ${timeData.localDate} @ ${timeData.localTime} - ${home} vs ${away}\n`;
                }
            });

            message += dictionary[currentLang].wpFooter + GITHUB_PAGES_URL;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = init;
    </script>
</body>
</html>
