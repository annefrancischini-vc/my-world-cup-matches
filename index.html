<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <h1 class="text-xl font-bold mb-4">O que você quer assistir?</h1>
  <div id="grid" class="grid grid-cols-2 gap-3 mb-20"></div>
  
  <button id="btnVer" class="hidden fixed bottom-5 left-5 right-5 bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg" onclick="showMatches()">Ver Matches</button>

  <div id="listaMatches" class="hidden space-y-3 pb-20"></div>
  <button id="btnZap" class="hidden fixed bottom-5 left-5 right-5 bg-green-500 text-white p-4 rounded-xl font-bold shadow-lg" onclick="enviarZap()">Enviar pelo WhatsApp</button>

  <script>
    let allData = {}, selectedFilter = "";

    // SEU LINK DO GOOGLE SCRIPT AQUI
    fetch("https://script.google.com/macros/s/AKfycbxaC79CP79z3285sd2PYClBfQvkK6W0GaRSS0sVsueuJ0-ANwdOAvPQ9CDfIDi6Rhlz/exec")
      .then(r => r.json())
      .then(d => {
        allData = d;
        const grid = document.getElementById('grid');
        d.filters.forEach(f => {
          grid.innerHTML += `<div onclick="select('${f}', this)" class="bg-white p-4 rounded-xl border-2 cursor-pointer text-center font-medium">${f}</div>`;
        });
      });

    function select(f, el) {
      selectedFilter = f;
      document.querySelectorAll('#grid div').forEach(d => d.classList.remove('border-blue-500'));
      el.classList.add('border-blue-500');
      document.getElementById('btnVer').classList.remove('hidden');
    }

    function showMatches() {
      const list = allData.matches.filter(m => m.filter === selectedFilter);
      let html = `<h2 class="text-xl font-bold my-4">Jogos de ${selectedFilter}</h2>`;
      list.forEach(m => {
        html += `<div class="bg-white p-4 rounded-lg flex items-center gap-3 border shadow-sm">
                   <input type="checkbox" class="match-check w-5 h-5" value="${m.t1} x ${m.t2}"> 
                   <span class="text-sm">${m.t1} x ${m.t2}</span>
                 </div>`;
      });
      document.getElementById('listaMatches').innerHTML = html;
      document.getElementById('listaMatches').classList.remove('hidden');
      document.getElementById('btnZap').classList.remove('hidden');
      document.getElementById('grid').classList.add('hidden');
      document.getElementById('btnVer').classList.add('hidden');
    }

    function enviarZap() {
      let jogos = Array.from(document.querySelectorAll('.match-check:checked')).map(c => c.value).join('%0A');
      if (!jogos) return alert("Selecione pelo menos um jogo!");
      window.open(`https://wa.me/?text=Quero assistir aos jogos:%0A${jogos}`);
    }
  </script>
</body>
</html>
